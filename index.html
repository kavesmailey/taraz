<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تنخواه</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F6F3EC;
    --paper-raised: #FFFFFF;
    --ink: #1F2A37;
    --ink-soft: #5B6472;
    --gold: #A9762E;
    --line: #DDD5C2;
    --danger: #B3402F;
    --success: #3F6B4E;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    min-height: 100vh;
  }
  body { padding: 16px 16px 110px; }
  .screen-title {
    font-size: 20px; font-weight: 800; margin: 4px 0 18px;
  }
  .balance-strip {
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 20px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .balance-strip .label { font-size: 13px; color: var(--ink-soft); }
  .balance-strip .value {
    font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums;
    color: var(--gold); direction: ltr;
  }
  .balance-strip .value.negative { color: var(--danger); }

  .amount-block { text-align: center; margin: 28px 0 32px; }
  .amount-input {
    width: 100%; border: none; background: transparent;
    text-align: center; font-size: 44px; font-weight: 900;
    font-variant-numeric: tabular-nums; color: var(--gold);
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    direction: ltr;
  }
  .amount-input:focus-visible {
    outline: 2px solid var(--gold); outline-offset: 8px; border-radius: 8px;
  }
  .amount-suffix { font-size: 14px; color: var(--ink-soft); margin-top: 2px; }
  .amount-rule { height: 2px; background: var(--ink); width: 64px; margin: 10px auto 0; opacity: .15; }

  .ledger-row {
    display: flex; flex-direction: column; gap: 6px;
    padding: 14px 2px; border-bottom: 1px solid var(--line);
    transition: border-color .15s;
  }
  .ledger-row:focus-within { border-color: var(--gold); }
  .ledger-row label { font-size: 13px; color: var(--ink-soft); font-weight: 600; }
  .ledger-row input[type=text], .ledger-row input[type=number], .ledger-row textarea, .ledger-row select {
    border: none; background: transparent; font-size: 16px; color: var(--ink);
    font-family: 'Vazirmatn', Tahoma, sans-serif; resize: none; padding: 0;
  }
  .ledger-row input:focus, .ledger-row textarea:focus, .ledger-row select:focus { outline: none; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 8px; padding-top: 4px; }
  .tag-chip {
    padding: 8px 14px; border-radius: 20px; border: 1px solid var(--line);
    font-size: 13px; font-weight: 600; color: var(--ink-soft); background: var(--paper-raised);
    cursor: pointer;
  }
  .tag-chip:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .tag-chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .receipt-zone {
    border: 1.5px dashed var(--line); border-radius: var(--radius);
    padding: 18px; text-align: center; color: var(--ink-soft); font-size: 13px;
    margin-top: 6px; position: relative; overflow: hidden;
  }
  .receipt-zone img { max-width: 100%; border-radius: 8px; margin-top: 8px; display: block; }
  .receipt-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }

  .employee-search {
    width: 100%; padding: 12px 14px; border-radius: var(--radius);
    border: 1px solid var(--line); background: var(--paper-raised);
    font-family: 'Vazirmatn', Tahoma, sans-serif; font-size: 15px; margin-bottom: 14px;
  }
  .employee-search:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .employee-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 4px; border-bottom: 1px solid var(--line); cursor: pointer;
  }
  .employee-row .name { font-weight: 600; font-size: 15px; }
  .employee-row .balance { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--gold); direction: ltr; }
  .employee-row .balance.negative { color: var(--danger); }

  .charge-form { padding-top: 6px; }

  .preview-badge {
    position: fixed; top: 8px; left: 8px; background: var(--ink); color: var(--paper);
    font-size: 11px; padding: 4px 10px; border-radius: 12px; z-index: 50; opacity: .85;
  }
  .preview-switch {
    position: fixed; bottom: 14px; right: 14px; left: 14px;
    display: flex; gap: 6px; z-index: 50;
  }
  .preview-switch button {
    flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--paper-raised); font-family: inherit; font-size: 12px; cursor: pointer;
  }
  .toast {
    position: fixed; bottom: 96px; left: 16px; right: 16px;
    background: var(--ink); color: var(--paper); padding: 12px 16px;
    border-radius: 10px; font-size: 13px; text-align: center;
    transform: translateY(20px); opacity: 0; transition: .25s; z-index: 60;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  #rawInitData, #companiesResponse, #tagsResponse, #employeesResponse, #expenseLog {
    width: 100%; padding: 10px; border: 1px solid var(--line); border-radius: 10px;
    background: var(--paper-raised); font-family: monospace;
  }

  .test-btn {
    width: 100%; padding: 12px; border: none; border-radius: 10px;
    background: var(--ink); color: var(--paper); font-family: inherit;
    font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px;
  }
  .test-btn:disabled { opacity: .5; cursor: default; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<div id="previewBadge" class="preview-badge" style="display:none">پیش‌نمایش خارج از تلگرام</div>
<div id="app"></div>
<div id="toast" class="toast"></div>
<div id="previewSwitch" class="preview-switch" style="display:none">
  <button onclick="location.search='?screen=home'">خانه</button>
  <button onclick="location.search='?screen=expense'">ثبت هزینه</button>
  <button onclick="location.search='?screen=request'">درخواست تنخواه</button>
  <button onclick="location.search='?screen=charge'">شارژ (مدیر مالی)</button>
</div>

<script>
// ===================================================================
// تنخواه — Telegram WebApp
// این یک فایل، صفحات را مدیریت می‌کند: expense | request | charge | test
// انتخاب صفحه از طریق پارامتر ?screen= در آدرس مشخص می‌شود.
// ===================================================================

// Supabase Edge Functions base URL (project ref: btbmoiqyapfqrigukpzt)
// ⚠️ get-companies، get-tags، get-employees، submit-expense، submit-charge
// و submit-petty-cash-request همگی ساخته و دیپلوی شده‌اند. submit-settlement
// هنوز ساخته نشده — فراخوانیش فعلاً fail می‌شود و به داده‌ی دمو (DEMO_*)
// سقوط می‌کند. این یک TODO شناخته‌شده است، نه باگ.
const API_BASE_URL = "https://btbmoiqyapfqrigukpzt.supabase.co/functions/v1";

const tg = window.Telegram?.WebApp;
const isInsideTelegram = !!(tg && tg.initData);

function applyTelegramTheme() {
  if (!tg || !tg.themeParams) return;
  const root = document.documentElement.style;
  const tp = tg.themeParams;
  if (tp.bg_color) root.setProperty('--paper', tp.bg_color);
  if (tp.secondary_bg_color) root.setProperty('--paper-raised', tp.secondary_bg_color);
  if (tp.text_color) root.setProperty('--ink', tp.text_color);
  if (tp.hint_color) root.setProperty('--ink-soft', tp.hint_color);
}

if (tg) {
  tg.ready();
  tg.expand();
  applyTelegramTheme();
  tg.onEvent('themeChanged', applyTelegramTheme);
}
if (!isInsideTelegram) {
  document.getElementById('previewBadge').style.display = 'block';
  document.getElementById('previewSwitch').style.display = 'flex';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function formatNumber(n) {
  if (n === null || n === undefined || n === '') return '';
  return Number(n).toLocaleString('en-US');
}

// ارقام فارسی/عربی را به لاتین تبدیل می‌کند — برای وقتی می‌خواهیم مقدار را
// به سرور بفرستیم (Number(...) فقط ارقام لاتین را می‌فهمد).
function toWesternDigits(str) {
  const persian = '۰۱۲۳۴۵۶۷۸۹';
  const arabic = '٠١٢٣٤٥٦٧٨٩';
  return str.replace(/[۰-۹٠-٩]/g, (ch) => {
    const p = persian.indexOf(ch);
    if (p !== -1) return String(p);
    const a = arabic.indexOf(ch);
    if (a !== -1) return String(a);
    return ch;
  });
}

// ارقام لاتین را به فارسی تبدیل می‌کند — برای نمایش توی کادر ورودی.
function toPersianDigits(str) {
  const persian = '۰۱۲۳۴۵۶۷۸۹';
  return str.replace(/[0-9]/g, (d) => persian[Number(d)]);
}

// قانون ورودی‌های عددی توی این فایل: type="tel" + inputmode="numeric" +
// این تابع روی رویداد input. کاربر با هر کیبوردی تایپ کنه (فارسی یا انگلیسی)،
// همیشه ارقام فارسی توی کادر نمایش داده می‌شه — چون این یه اپ فارسیه.
// موقع خوندن مقدار برای فرستادن به سرور، حتماً باید از toWesternDigits رد بشه
// (چون Number('۵۰۰۰') در جاوااسکریپت NaN می‌ده، نه 5000).
function sanitizeNumericInput(inputEl) {
  inputEl.addEventListener('input', (e) => {
    const westernDigitsOnly = toWesternDigits(e.target.value).replace(/[^\d]/g, '');
    e.target.value = toPersianDigits(westernDigitsOnly);
  });
}

// مقدار یک ورودی عددی (که رقم‌های فارسی نمایش می‌ده) را به عدد قابل‌استفاده
// برای سرور تبدیل می‌کند. همه‌جا به‌جای Number(el.value) از این استفاده کن.
function readNumericInput(inputEl) {
  return Number(toWesternDigits(inputEl.value));
}

// همه‌ی Edge Function های ما فقط POST قبول می‌کنن — یک تابع واحد برای همه.
async function apiPost(endpoint, payload) {
  try {
    const res = await fetch(`${API_BASE_URL}/${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData: tg?.initData || null, ...payload })
    });
    if (!res.ok) throw new Error('bad response: ' + res.status);
    return await res.json();
  } catch (e) {
    console.warn(`apiPost(${endpoint}) failed:`, e);
    return null;
  }
}

// چون هنوز چندشرکتی (multi-company) نداریم (Phase 5.8، ساخته نشده)، همیشه اولین
// شرکتی که get-companies برمی‌گردونه رو به عنوان شرکت فعال کاربر در نظر می‌گیریم.
let cachedCompanyId = null;
async function getMyCompanyId() {
  if (cachedCompanyId) return cachedCompanyId;
  const result = await apiPost('get-companies', {});
  const companies = result?.companies || [];
  if (companies.length === 0) return null;
  cachedCompanyId = companies[0].company_id;
  return cachedCompanyId;
}

// --- داده‌ی نمایشی برای پیش‌نمایش، تا زمان ساخته‌شدن بقیه‌ی Edge Function ها ---
const DEMO_TAGS = [
  { id: 'fuel', name: 'سوخت' },
  { id: 'meal', name: 'پذیرایی' },
  { id: 'office', name: 'لوازم اداری' },
  { id: 'transport', name: 'حمل‌ونقل' },
  { id: 'other', name: 'متفرقه' },
];
const DEMO_BALANCE = 850000;
const DEMO_EMPLOYEES = [
  { company_member_id: 'u1', name: 'علی محمدی', balance: 850000 },
  { company_member_id: 'u2', name: 'سارا احمدی', balance: 120000 },
  { company_member_id: 'u3', name: 'رضا کریمی', balance: -50000 },
  { company_member_id: 'u4', name: 'مریم رضایی', balance: 0 },
];

const app = document.getElementById('app');
const screen = new URLSearchParams(location.search).get('screen') || 'home';

// ===================================================================
// صفحه: ثبت هزینه
// ===================================================================
async function renderExpenseScreen() {
  const companyId = await getMyCompanyId();
  const tagsResult = companyId ? await apiPost('get-tags', { company_id: companyId }) : null;
  const tagsData = tagsResult?.tags || DEMO_TAGS;
  const balance = DEMO_BALANCE; // در آینده از یک endpoint موجودی گرفته می‌شود

  let selectedTag = null;
  let receiptBase64 = null;

  app.innerHTML = `
    <div class="screen-title">🧾 ثبت هزینه</div>
    <div class="balance-strip">
      <span class="label">موجودی فعلی</span>
      <span class="value ${balance < 0 ? 'negative' : ''}">${formatNumber(balance)} تومان</span>
    </div>

    <div class="amount-block">
      <input id="amount" class="amount-input" type="tel" inputmode="numeric" placeholder="0" />
      <div class="amount-rule"></div>
      <div class="amount-suffix">تومان</div>
    </div>

    <div class="ledger-row">
      <label>تگ هزینه</label>
      <div id="tagList" class="tag-list"></div>
    </div>

    <div class="ledger-row">
      <label>توضیح (اختیاری)</label>
      <textarea id="description" rows="2" placeholder="مثلاً: بنزین ماشین شرکت"></textarea>
    </div>

    <div class="ledger-row">
      <label>رسید (اختیاری)</label>
      <div class="receipt-zone" id="receiptZone">
        📎 برای انتخاب عکس رسید لمس کنید
        <input id="receiptInput" type="file" accept="image/*" capture="environment" />
      </div>
    </div>
  `;

  const tagListEl = document.getElementById('tagList');
  tagsData.forEach(tag => {
    const chip = document.createElement('div');
    chip.className = 'tag-chip';
    chip.tabIndex = 0;
    chip.textContent = tag.name;
    chip.onclick = () => {
      selectedTag = tag.id;
      [...tagListEl.children].forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    };
    tagListEl.appendChild(chip);
  });

  sanitizeNumericInput(document.getElementById('amount'));

  document.getElementById('receiptInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      receiptBase64 = reader.result;
      const zone = document.getElementById('receiptZone');
      zone.innerHTML = `<img src="${receiptBase64}" alt="رسید" /><input id="receiptInput" type="file" accept="image/*" capture="environment" />`;
    };
    reader.readAsDataURL(file);
  });

  setupMainButton('ثبت هزینه', async () => {
    const amount = readNumericInput(document.getElementById('amount'));
    if (!amount || amount <= 0) {
      tg ? tg.showAlert('مبلغ را وارد کنید') : showToast('مبلغ را وارد کنید');
      return;
    }
    if (!selectedTag) {
      tg ? tg.showAlert('یک تگ انتخاب کنید') : showToast('یک تگ انتخاب کنید');
      return;
    }
    if (!companyId) {
      showToast('عضو هیچ شرکتی نیستید');
      return;
    }
    const result = await apiPost('submit-expense', {
      company_id: companyId,
      amount: amount,
      tag_id: selectedTag,
      description: document.getElementById('description').value,
    });
    if (result) {
      tg ? tg.close() : showToast('هزینه ثبت شد ✅');
    } else {
      showToast('سرور هنوز وصل نیست — این فقط پیش‌نمایش است');
    }
  });
}

// ===================================================================
// صفحه: درخواست تنخواه
// ===================================================================
async function renderRequestScreen() {
  const companyId = await getMyCompanyId();
  const balance = DEMO_BALANCE;
  app.innerHTML = `
    <div class="screen-title">💵 درخواست تنخواه</div>
    <div class="balance-strip">
      <span class="label">موجودی فعلی</span>
      <span class="value ${balance < 0 ? 'negative' : ''}">${formatNumber(balance)} تومان</span>
    </div>

    <div class="amount-block">
      <input id="amount" class="amount-input" type="tel" inputmode="numeric" placeholder="0" />
      <div class="amount-rule"></div>
      <div class="amount-suffix">تومان — مبلغ درخواستی</div>
    </div>

    <div class="ledger-row">
      <label>توضیح (اختیاری)</label>
      <textarea id="description" rows="2" placeholder="مثلاً: برای سفر کاری هفته آینده"></textarea>
    </div>
  `;

  sanitizeNumericInput(document.getElementById('amount'));

  setupMainButton('ارسال درخواست', async () => {
    const amount = readNumericInput(document.getElementById('amount'));
    if (!amount || amount <= 0) {
      tg ? tg.showAlert('مبلغ را وارد کنید') : showToast('مبلغ را وارد کنید');
      return;
    }
    if (!companyId) {
      showToast('عضو هیچ شرکتی نیستید');
      return;
    }
    const result = await apiPost('submit-petty-cash-request', {
      company_id: companyId,
      amount: amount,
      description: document.getElementById('description').value,
    });
    if (result) {
      tg ? tg.close() : showToast('درخواست ارسال شد ✅');
    } else {
      showToast('سرور هنوز وصل نیست — این فقط پیش‌نمایش است');
    }
  });
}

// ===================================================================
// صفحه: شارژ تنخواه (مدیر مالی)
// ===================================================================
async function renderChargeScreen() {
  const companyId = await getMyCompanyId();
  const employeesResult = companyId ? await apiPost('get-employees', { company_id: companyId }) : null;
  const employees = employeesResult?.employees || DEMO_EMPLOYEES;

  app.innerHTML = `
    <div class="screen-title">💰 شارژ تنخواه</div>
    <input id="search" class="employee-search" placeholder="🔍 جستجوی نام کارمند..." />
    <div id="empList"></div>
    <div id="chargeForm" class="charge-form" style="display:none">
      <div class="ledger-row"><label id="selectedName"></label></div>
      <div class="amount-block">
        <input id="chargeAmount" class="amount-input" type="tel" inputmode="numeric" placeholder="0" />
        <div class="amount-rule"></div>
        <div class="amount-suffix">تومان — مبلغ شارژ</div>
      </div>
      <div class="ledger-row">
        <label>توضیح (اختیاری)</label>
        <textarea id="chargeDescription" rows="2"></textarea>
      </div>
    </div>
  `;

  let selectedEmployee = null;
  const empListEl = document.getElementById('empList');

  function renderList(filter = '') {
    empListEl.innerHTML = '';
    employees
      .filter(e => e.name.includes(filter))
      .forEach(emp => {
        const row = document.createElement('div');
        row.className = 'employee-row';
        row.tabIndex = 0;
        row.innerHTML = `
          <span class="name">${emp.name}</span>
          <span class="balance ${emp.balance < 0 ? 'negative' : ''}">${formatNumber(emp.balance)} تومان</span>
        `;
        row.onclick = () => selectEmployee(emp);
        empListEl.appendChild(row);
      });
  }

  function selectEmployee(emp) {
    selectedEmployee = emp;
    document.getElementById('chargeForm').style.display = 'block';
    document.getElementById('selectedName').textContent = `در حال شارژ حساب: ${emp.name}`;
    document.getElementById('chargeAmount').focus();
    sanitizeNumericInput(document.getElementById('chargeAmount'));
    setupMainButton('ثبت شارژ', async () => {
      const amount = readNumericInput(document.getElementById('chargeAmount'));
      if (!amount || amount <= 0) {
        tg ? tg.showAlert('مبلغ را وارد کنید') : showToast('مبلغ را وارد کنید');
        return;
      }
      if (!companyId) {
        showToast('عضو هیچ شرکتی نیستید');
        return;
      }
      const result = await apiPost('submit-charge', {
        company_id: companyId,
        target_company_member_id: selectedEmployee.company_member_id,
        amount: amount,
        description: document.getElementById('chargeDescription').value,
      });
      if (result) {
        tg ? tg.close() : showToast('شارژ ثبت شد ✅');
      } else {
        showToast('سرور هنوز وصل نیست — این فقط پیش‌نمایش است');
      }
    });
  }

  document.getElementById('search').addEventListener('input', (e) => renderList(e.target.value));
  renderList();
}

// ===================================================================
// صفحه: تست اتصال — زنجیره‌ی واقعی get-companies -> get-tags -> get-employees
// به‌علاوه یک فرم واقعی برای submit-expense که می‌شود چندبار پشت‌سرهم زد
// (مثلاً برای تست منفی‌شدن موجودی). بدون داده‌ی دمو.
// ===================================================================
async function renderTestScreen() {
  app.innerHTML = `
    <div class="screen-title">🧪 تست اتصال</div>

    <div class="ledger-row">
      <label>وضعیت</label>
      <div id="testStatus" style="font-size:14px;">در حال ارسال درخواست...</div>
    </div>

    <div class="ledger-row">
      <label>initData (خام)</label>
      <textarea id="rawInitData" rows="4" readonly style="font-size:11px;direction:ltr;"></textarea>
    </div>

    <div class="ledger-row">
      <label>پاسخ get-companies</label>
      <textarea id="companiesResponse" rows="6" readonly style="font-size:11px;direction:ltr;"></textarea>
    </div>

    <div class="ledger-row">
      <label>پاسخ get-tags</label>
      <textarea id="tagsResponse" rows="6" readonly style="font-size:11px;direction:ltr;"></textarea>
    </div>

    <div class="ledger-row">
      <label>پاسخ get-employees</label>
      <textarea id="employeesResponse" rows="8" readonly style="font-size:11px;direction:ltr;"></textarea>
    </div>

    <div class="ledger-row" id="expenseFormRow" style="display:none">
      <label>🧪 تست submit-expense</label>
      <select id="testTagSelect" style="margin-top:6px;padding:8px;border:1px solid var(--line);border-radius:8px;"></select>
      <input id="testAmount" type="tel" inputmode="numeric" placeholder="مبلغ (تومان)" style="margin-top:8px;padding:8px;border:1px solid var(--line);border-radius:8px;" />
      <button id="testSubmitExpenseBtn" class="test-btn">ثبت هزینه‌ی تستی</button>
    </div>

    <div class="ledger-row">
      <label>لاگ submit-expense (هر تست یک خط اضافه می‌شود)</label>
      <textarea id="expenseLog" rows="8" readonly style="font-size:11px;direction:ltr;"></textarea>
    </div>

    <div class="ledger-row" id="chargeFormRow" style="display:none">
      <label>🧪 تست submit-charge (فقط owner)</label>
      <select id="testEmployeeSelect" style="margin-top:6px;padding:8px;border:1px solid var(--line);border-radius:8px;"></select>
      <input id="testChargeAmount" type="tel" inputmode="numeric" placeholder="مبلغ شارژ (تومان)" style="margin-top:8px;padding:8px;border:1px solid var(--line);border-radius:8px;" />
      <button id="testSubmitChargeBtn" class="test-btn">ثبت شارژ تستی</button>
    </div>

    <div class="ledger-row">
      <label>لاگ submit-charge (هر تست یک خط اضافه می‌شود)</label>
      <textarea id="chargeLog" rows="8" readonly style="font-size:11px;direction:ltr;"></textarea>
    </div>

    <div class="ledger-row">
      <label>🧪 تست submit-petty-cash-request</label>
      <input id="testRequestAmount" type="tel" inputmode="numeric" placeholder="مبلغ درخواستی (تومان)" style="margin-top:8px;padding:8px;border:1px solid var(--line);border-radius:8px;" />
      <button id="testSubmitRequestBtn" class="test-btn">ثبت درخواست تستی</button>
    </div>

    <div class="ledger-row">
      <label>لاگ submit-petty-cash-request (هر تست یک خط اضافه می‌شود)</label>
      <textarea id="requestLog" rows="8" readonly style="font-size:11px;direction:ltr;"></textarea>
    </div>
  `;

  const initDataEl = document.getElementById('rawInitData');
  const statusEl = document.getElementById('testStatus');
  const companiesEl = document.getElementById('companiesResponse');
  const tagsEl = document.getElementById('tagsResponse');
  const employeesEl = document.getElementById('employeesResponse');
  const expenseLogEl = document.getElementById('expenseLog');
  const expenseFormRow = document.getElementById('expenseFormRow');
  const testTagSelect = document.getElementById('testTagSelect');
  const testAmount = document.getElementById('testAmount');
  const testSubmitExpenseBtn = document.getElementById('testSubmitExpenseBtn');
  const chargeLogEl = document.getElementById('chargeLog');
  const chargeFormRow = document.getElementById('chargeFormRow');
  const testEmployeeSelect = document.getElementById('testEmployeeSelect');
  const testChargeAmount = document.getElementById('testChargeAmount');
  const testSubmitChargeBtn = document.getElementById('testSubmitChargeBtn');
  const requestLogEl = document.getElementById('requestLog');
  const testRequestAmount = document.getElementById('testRequestAmount');
  const testSubmitRequestBtn = document.getElementById('testSubmitRequestBtn');

  initDataEl.value = tg?.initData || '(بیرون از تلگرام هستید — initData خالی است)';

  if (!tg?.initData) {
    statusEl.textContent = '❌ initData موجود نیست. این صفحه باید از طریق دکمه‌ی «🧪 تست اتصال» در منوی تنظیمات، داخل تلگرام باز شود.';
    return;
  }

  // مرحله ۱: get-companies
  let companies = [];
  try {
    const res = await fetch(`${API_BASE_URL}/get-companies`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData: tg.initData }),
    });
    const text = await res.text();
    companiesEl.value = `HTTP ${res.status}\n${text}`;
    if (res.ok) {
      const json = JSON.parse(text);
      companies = json.companies || [];
    }
  } catch (e) {
    companiesEl.value = `خطا: ${e}`;
    statusEl.textContent = '❌ get-companies fail شد';
    return;
  }

  if (companies.length === 0) {
    statusEl.textContent = '⚠️ get-companies موفق بود ولی هیچ شرکتی برنگشت.';
    tagsEl.value = '(شرکتی برای تست وجود ندارد)';
    employeesEl.value = '(شرکتی برای تست وجود ندارد)';
    return;
  }

  const firstCompany = companies[0];
  let tags = [];

  // مرحله ۲: get-tags
  try {
    const res = await fetch(`${API_BASE_URL}/get-tags`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData: tg.initData, company_id: firstCompany.company_id }),
    });
    const text = await res.text();
    tagsEl.value = `شرکت: ${firstCompany.name} (${firstCompany.company_id})\nHTTP ${res.status}\n${text}`;
    if (res.ok) {
      const json = JSON.parse(text);
      tags = json.tags || [];
    }
  } catch (e) {
    tagsEl.value = `خطا: ${e}`;
  }

  // مرحله ۳: get-employees (ممکنه 403 بده اگه کاربر owner نباشه — طبیعیه)
  let employees = [];
  try {
    const res = await fetch(`${API_BASE_URL}/get-employees`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData: tg.initData, company_id: firstCompany.company_id }),
    });
    const text = await res.text();
    employeesEl.value = `شرکت: ${firstCompany.name} (${firstCompany.company_id})\nHTTP ${res.status}\n${text}`;
    if (res.ok) {
      const json = JSON.parse(text);
      employees = json.employees || [];
    }
  } catch (e) {
    employeesEl.value = `خطا: ${e}`;
  }

  statusEl.textContent = '✅ آماده برای تست submit-expense — پایین صفحه رو ببین';

  // --- فرم تست submit-expense ---
  if (tags.length > 0) {
    testTagSelect.innerHTML = tags.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
  } else {
    testTagSelect.innerHTML = `<option value="">(بدون تگ)</option>`;
  }
  expenseFormRow.style.display = 'flex';
  sanitizeNumericInput(testAmount);

  testSubmitExpenseBtn.addEventListener('click', async () => {
    const amount = readNumericInput(testAmount);
    if (!amount || amount <= 0) {
      showToast('مبلغ معتبر وارد کن');
      return;
    }
    const tagId = testTagSelect.value || null;
    testSubmitExpenseBtn.disabled = true;
    testSubmitExpenseBtn.textContent = 'در حال ارسال...';

    try {
      const res = await fetch(`${API_BASE_URL}/submit-expense`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          initData: tg.initData,
          company_id: firstCompany.company_id,
          tag_id: tagId,
          amount: amount,
          description: 'تست دستی از صفحه‌ی test',
        }),
      });
      const text = await res.text();
      const timestamp = new Date().toLocaleTimeString('fa-IR');
      expenseLogEl.value = `[${timestamp}] مبلغ: ${amount} | HTTP ${res.status}\n${text}\n\n` + expenseLogEl.value;
    } catch (e) {
      expenseLogEl.value = `خطا: ${e}\n\n` + expenseLogEl.value;
    } finally {
      testSubmitExpenseBtn.disabled = false;
      testSubmitExpenseBtn.textContent = 'ثبت هزینه‌ی تستی';
    }
  });

  // --- فرم تست submit-charge ---
  // فقط اگه get-employees موفق بود (یعنی کاربر فعلی owner همین شرکته) نمایش داده می‌شه —
  // برای کاربر employee این بخش مخفی می‌مونه چون submit-charge روش 403 می‌ده.
  if (employees.length > 0) {
    testEmployeeSelect.innerHTML = employees
      .map(e => `<option value="${e.company_member_id}">${e.name} (${e.role}) — موجودی فعلی: ${e.balance}</option>`)
      .join('');
    chargeFormRow.style.display = 'flex';
    sanitizeNumericInput(testChargeAmount);
  }

  testSubmitChargeBtn.addEventListener('click', async () => {
    const amount = readNumericInput(testChargeAmount);
    if (!amount || amount <= 0) {
      showToast('مبلغ معتبر وارد کن');
      return;
    }
    const targetId = testEmployeeSelect.value;
    testSubmitChargeBtn.disabled = true;
    testSubmitChargeBtn.textContent = 'در حال ارسال...';

    try {
      const res = await fetch(`${API_BASE_URL}/submit-charge`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          initData: tg.initData,
          company_id: firstCompany.company_id,
          target_company_member_id: targetId,
          amount: amount,
          description: 'تست دستی از صفحه‌ی test',
        }),
      });
      const text = await res.text();
      const timestamp = new Date().toLocaleTimeString('fa-IR');
      chargeLogEl.value = `[${timestamp}] گیرنده: ${targetId} | مبلغ: ${amount} | HTTP ${res.status}\n${text}\n\n` + chargeLogEl.value;
    } catch (e) {
      chargeLogEl.value = `خطا: ${e}\n\n` + chargeLogEl.value;
    } finally {
      testSubmitChargeBtn.disabled = false;
      testSubmitChargeBtn.textContent = 'ثبت شارژ تستی';
    }
  });

  // --- فرم تست submit-petty-cash-request ---
  sanitizeNumericInput(testRequestAmount);

  testSubmitRequestBtn.addEventListener('click', async () => {
    const amount = readNumericInput(testRequestAmount);
    if (!amount || amount <= 0) {
      showToast('مبلغ معتبر وارد کن');
      return;
    }
    testSubmitRequestBtn.disabled = true;
    testSubmitRequestBtn.textContent = 'در حال ارسال...';

    try {
      const res = await fetch(`${API_BASE_URL}/submit-petty-cash-request`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          initData: tg.initData,
          company_id: firstCompany.company_id,
          amount: amount,
          description: 'تست دستی از صفحه‌ی test',
        }),
      });
      const text = await res.text();
      const timestamp = new Date().toLocaleTimeString('fa-IR');
      requestLogEl.value = `[${timestamp}] مبلغ: ${amount} | HTTP ${res.status}\n${text}\n\n` + requestLogEl.value;
    } catch (e) {
      requestLogEl.value = `خطا: ${e}\n\n` + requestLogEl.value;
    } finally {
      testSubmitRequestBtn.disabled = false;
      testSubmitRequestBtn.textContent = 'ثبت درخواست تستی';
    }
  });
}

// ===================================================================
// دکمه اصلی — از MainButton تلگرام استفاده می‌کند، یا در پیش‌نمایش جایگزین دارد
// ===================================================================
function setupMainButton(label, onClick) {
  if (tg) {
    tg.MainButton.setText(label);
    tg.MainButton.show();
    if (tg._lastHandler) tg.MainButton.offClick(tg._lastHandler);
    tg.MainButton.onClick(onClick);
    tg._lastHandler = onClick;
  } else {
    let btn = document.getElementById('fallbackMainButton');
    if (!btn) {
      btn = document.createElement('button');
      btn.id = 'fallbackMainButton';
      btn.style = 'position:fixed;bottom:60px;left:14px;right:14px;padding:14px;border:none;border-radius:12px;background:var(--ink);color:var(--paper);font-family:inherit;font-size:15px;font-weight:700;z-index:55;cursor:pointer;';
      document.body.appendChild(btn);
    }
    btn.textContent = label;
    btn.onclick = onClick;
  }
}

// ===================================================================
// صفحه: خانه — مقصد پیش‌فرض Menu Button تلگرام (آیکون کنار اتچمنت).
// چون Menu Button فقط می‌تونه یک URL ثابت باز کنه (نه پیام inline تلگرام)،
// این صفحه همون نقش «منو» رو داخل خود WebApp بازی می‌کنه.
// ===================================================================
function renderHomeScreen() {
  app.innerHTML = `
    <div class="screen-title">تنخواه 👋</div>
    <div class="ledger-row" style="border:none;">
      <button id="homeExpenseBtn" class="test-btn" style="background:var(--gold);margin-bottom:10px;">🧾 ثبت هزینه</button>
      <button id="homeRequestBtn" class="test-btn" style="background:var(--ink);margin-bottom:10px;">💵 درخواست تنخواه</button>
      <button id="homeSettingsBtn" class="test-btn" style="background:var(--ink-soft);">⚙️ تنظیمات</button>
    </div>
  `;
  document.getElementById('homeExpenseBtn').addEventListener('click', () => {
    location.search = '?screen=expense';
  });
  document.getElementById('homeRequestBtn').addEventListener('click', () => {
    location.search = '?screen=request';
  });
  document.getElementById('homeSettingsBtn').addEventListener('click', () => {
    // بات username موقتیه، طبق گفته‌ی کاوه بعداً عوض می‌شه — اونجا این خط رو هم آپدیت کن.
    const settingsDeepLink = 'https://t.me/tarazofficialbot?start=settings';
    if (tg && tg.openTelegramLink) {
      tg.openTelegramLink(settingsDeepLink);
    } else {
      window.open(settingsDeepLink, '_blank');
    }
  });
}

// ===================================================================
// اجرای صفحه‌ی مناسب بر اساس پارامتر screen
// ===================================================================
if (screen === 'request') renderRequestScreen();
else if (screen === 'charge') renderChargeScreen();
else if (screen === 'test') renderTestScreen();
else if (screen === 'expense') renderExpenseScreen();
else renderHomeScreen();
</script>
</body>
</html>
