<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ШӘЩҶШ®ЩҲШ§ЩҮ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F6F3EC;
    --paper-raised: #FFFFFF;
    --ink: #1F2A37;
    --ink-soft: #5B6472;
    --gold: #A9762E;
    --line: #DDD5C2;
    --danger: #B3402F;
    --success: #3F6B4E;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    min-height: 100vh;
  }
  body { padding: 16px 16px 110px; }
  .screen-title {
    font-size: 20px; font-weight: 800; margin: 4px 0 18px;
  }
  .balance-strip {
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 20px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .balance-strip .label { font-size: 13px; color: var(--ink-soft); }
  .balance-strip .value {
    font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums;
    color: var(--gold); direction: ltr;
  }
  .balance-strip .value.negative { color: var(--danger); }

  .amount-block { text-align: center; margin: 28px 0 32px; }
  .amount-input {
    width: 100%; border: none; background: transparent;
    text-align: center; font-size: 44px; font-weight: 900;
    font-variant-numeric: tabular-nums; color: var(--gold);
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    direction: ltr;
  }
  .amount-input:focus-visible {
    outline: 2px solid var(--gold); outline-offset: 8px; border-radius: 8px;
  }
  .amount-suffix { font-size: 14px; color: var(--ink-soft); margin-top: 2px; }
  .amount-rule { height: 2px; background: var(--ink); width: 64px; margin: 10px auto 0; opacity: .15; }

  .ledger-row {
    display: flex; flex-direction: column; gap: 6px;
    padding: 14px 2px; border-bottom: 1px solid var(--line);
    transition: border-color .15s;
  }
  .ledger-row:focus-within { border-color: var(--gold); }
  .ledger-row label { font-size: 13px; color: var(--ink-soft); font-weight: 600; }
  .ledger-row input[type=text], .ledger-row input[type=number], .ledger-row textarea, .ledger-row select {
    border: none; background: transparent; font-size: 16px; color: var(--ink);
    font-family: 'Vazirmatn', Tahoma, sans-serif; resize: none; padding: 0;
  }
  .ledger-row input:focus, .ledger-row textarea:focus, .ledger-row select:focus { outline: none; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 8px; padding-top: 4px; }
  .tag-chip {
    padding: 8px 14px; border-radius: 20px; border: 1px solid var(--line);
    font-size: 13px; font-weight: 600; color: var(--ink-soft); background: var(--paper-raised);
    cursor: pointer;
  }
  .tag-chip:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .tag-chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .receipt-zone {
    border: 1.5px dashed var(--line); border-radius: var(--radius);
    padding: 18px; text-align: center; color: var(--ink-soft); font-size: 13px;
    margin-top: 6px; position: relative; overflow: hidden;
  }
  .receipt-zone img { max-width: 100%; border-radius: 8px; margin-top: 8px; display: block; }
  .receipt-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }

  .employee-search {
    width: 100%; padding: 12px 14px; border-radius: var(--radius);
    border: 1px solid var(--line); background: var(--paper-raised);
    font-family: 'Vazirmatn', Tahoma, sans-serif; font-size: 15px; margin-bottom: 14px;
  }
  .employee-search:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .employee-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 4px; border-bottom: 1px solid var(--line); cursor: pointer;
  }
  .employee-row .name { font-weight: 600; font-size: 15px; }
  .employee-row .balance { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--gold); direction: ltr; }
  .employee-row .balance.negative { color: var(--danger); }

  .charge-form { padding-top: 6px; }

  .preview-badge {
    position: fixed; top: 8px; left: 8px; background: var(--ink); color: var(--paper);
    font-size: 11px; padding: 4px 10px; border-radius: 12px; z-index: 50; opacity: .85;
  }
  .preview-switch {
    position: fixed; bottom: 14px; right: 14px; left: 14px;
    display: flex; gap: 6px; z-index: 50;
  }
  .preview-switch button {
    flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--paper-raised); font-family: inherit; font-size: 12px; cursor: pointer;
  }
  .toast {
    position: fixed; bottom: 96px; left: 16px; right: 16px;
    background: var(--ink); color: var(--paper); padding: 12px 16px;
    border-radius: 10px; font-size: 13px; text-align: center;
    transform: translateY(20px); opacity: 0; transition: .25s; z-index: 60;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  #rawInitData, #companiesResponse, #tagsResponse, #employeesResponse, #expenseLog {
    width: 100%; padding: 10px; border: 1px solid var(--line); border-radius: 10px;
    background: var(--paper-raised); font-family: monospace;
  }

  .test-btn {
    width: 100%; padding: 12px; border: none; border-radius: 10px;
    background: var(--ink); color: var(--paper); font-family: inherit;
    font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px;
  }
  .test-btn:disabled { opacity: .5; cursor: default; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<div id="previewBadge" class="preview-badge" style="display:none">ЩҫЫҢШҙвҖҢЩҶЩ…Ш§ЫҢШҙ Ш®Ш§ШұШ¬ Ш§ШІ ШӘЩ„ЪҜШұШ§Щ…</div>
<div id="app"></div>
<div id="toast" class="toast"></div>
<div id="previewSwitch" class="preview-switch" style="display:none">
  <button onclick="location.search='?screen=home'">Ш®Ш§ЩҶЩҮ</button>
  <button onclick="location.search='?screen=expense'">Ш«ШЁШӘ ЩҮШІЫҢЩҶЩҮ</button>
  <button onclick="location.search='?screen=request'">ШҜШұШ®ЩҲШ§ШіШӘ ШӘЩҶШ®ЩҲШ§ЩҮ</button>
  <button onclick="location.search='?screen=charge'">ШҙШ§ШұЪҳ (Щ…ШҜЫҢШұ Щ…Ш§Щ„ЫҢ)</button>
</div>

<script>
// ===================================================================
// ШӘЩҶШ®ЩҲШ§ЩҮ вҖ” Telegram WebApp
// Ш§ЫҢЩҶ ЫҢЪ© ЩҒШ§ЫҢЩ„ШҢ ШөЩҒШӯШ§ШӘ ШұШ§ Щ…ШҜЫҢШұЫҢШӘ Щ…ЫҢвҖҢЪ©ЩҶШҜ: expense | request | charge | test
// Ш§ЩҶШӘШ®Ш§ШЁ ШөЩҒШӯЩҮ Ш§ШІ Ш·ШұЫҢЩӮ ЩҫШ§ШұШ§Щ…ШӘШұ ?screen= ШҜШұ ШўШҜШұШі Щ…ШҙШ®Шө Щ…ЫҢвҖҢШҙЩҲШҜ.
// ===================================================================

// Supabase Edge Functions base URL (project ref: btbmoiqyapfqrigukpzt)
// вҡ пёҸ ЩҮЩ…ЩҮвҖҢЫҢ endpoint ЩҮШ§ЫҢ Ш§ШөЩ„ЫҢ ШіШ§Ш®ШӘЩҮ ШҙШҜЩҮвҖҢШ§ЩҶШҜ: get-companiesШҢ get-tagsШҢ
// get-employeesШҢ submit-expenseШҢ submit-chargeШҢ submit-petty-cash-requestШҢ
// create-companyШҢ invite-memberШҢ get-registered-expensesШҢ submit-settlementШҢ
// get-settlement-detailШҢ review-settlement.
const API_BASE_URL = "https://btbmoiqyapfqrigukpzt.supabase.co/functions/v1";

const tg = window.Telegram?.WebApp;
const isInsideTelegram = !!(tg && tg.initData);

function applyTelegramTheme() {
  if (!tg || !tg.themeParams) return;
  const root = document.documentElement.style;
  const tp = tg.themeParams;
  if (tp.bg_color) root.setProperty('--paper', tp.bg_color);
  if (tp.secondary_bg_color) root.setProperty('--paper-raised', tp.secondary_bg_color);
  if (tp.text_color) root.setProperty('--ink', tp.text_color);
  if (tp.hint_color) root.setProperty('--ink-soft', tp.hint_color);
}

if (tg) {
  tg.ready();
  tg.expand();
  applyTelegramTheme();
  tg.onEvent('themeChanged', applyTelegramTheme);
}
if (!isInsideTelegram) {
  document.getElementById('previewBadge').style.display = 'block';
  document.getElementById('previewSwitch').style.display = 'flex';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function formatNumber(n) {
  if (n === null || n === undefined || n === '') return '';
  return Number(n).toLocaleString('en-US');
}

// Ш§ШұЩӮШ§Щ… ЩҒШ§ШұШіЫҢ/Ш№ШұШЁЫҢ ШұШ§ ШЁЩҮ Щ„Ш§ШӘЫҢЩҶ ШӘШЁШҜЫҢЩ„ Щ…ЫҢвҖҢЪ©ЩҶШҜ вҖ” ШЁШұШ§ЫҢ ЩҲЩӮШӘЫҢ Щ…ЫҢвҖҢШ®ЩҲШ§ЩҮЫҢЩ… Щ…ЩӮШҜШ§Шұ ШұШ§
// ШЁЩҮ ШіШұЩҲШұ ШЁЩҒШұШіШӘЫҢЩ… (Number(...) ЩҒЩӮШ· Ш§ШұЩӮШ§Щ… Щ„Ш§ШӘЫҢЩҶ ШұШ§ Щ…ЫҢвҖҢЩҒЩҮЩ…ШҜ).
function toWesternDigits(str) {
  const persian = 'Ы°ЫұЫІЫіЫҙЫөЫ¶Ы·ЫёЫ№';
  const arabic = 'Щ ЩЎЩўЩЈЩӨЩҘЩҰЩ§ЩЁЩ©';
  return str.replace(/[Ы°-Ы№Щ -Щ©]/g, (ch) => {
    const p = persian.indexOf(ch);
    if (p !== -1) return String(p);
    const a = arabic.indexOf(ch);
    if (a !== -1) return String(a);
    return ch;
  });
}

// Ш§ШұЩӮШ§Щ… Щ„Ш§ШӘЫҢЩҶ ШұШ§ ШЁЩҮ ЩҒШ§ШұШіЫҢ ШӘШЁШҜЫҢЩ„ Щ…ЫҢвҖҢЪ©ЩҶШҜ вҖ” ШЁШұШ§ЫҢ ЩҶЩ…Ш§ЫҢШҙ ШӘЩҲЫҢ Ъ©Ш§ШҜШұ ЩҲШұЩҲШҜЫҢ.
function toPersianDigits(str) {
  const persian = 'Ы°ЫұЫІЫіЫҙЫөЫ¶Ы·ЫёЫ№';
  return str.replace(/[0-9]/g, (d) => persian[Number(d)]);
}

// ЩӮШ§ЩҶЩҲЩҶ ЩҲШұЩҲШҜЫҢвҖҢЩҮШ§ЫҢ Ш№ШҜШҜЫҢ ШӘЩҲЫҢ Ш§ЫҢЩҶ ЩҒШ§ЫҢЩ„: type="tel" + inputmode="numeric" +
// Ш§ЫҢЩҶ ШӘШ§ШЁШ№ ШұЩҲЫҢ ШұЩҲЫҢШҜШ§ШҜ input. Ъ©Ш§ШұШЁШұ ШЁШ§ ЩҮШұ Ъ©ЫҢШЁЩҲШұШҜЫҢ ШӘШ§ЫҢЩҫ Ъ©ЩҶЩҮ (ЩҒШ§ШұШіЫҢ ЫҢШ§ Ш§ЩҶЪҜЩ„ЫҢШіЫҢ)ШҢ
// ЩҮЩ…ЫҢШҙЩҮ Ш§ШұЩӮШ§Щ… ЩҒШ§ШұШіЫҢ ШӘЩҲЫҢ Ъ©Ш§ШҜШұ ЩҶЩ…Ш§ЫҢШҙ ШҜШ§ШҜЩҮ Щ…ЫҢвҖҢШҙЩҮ вҖ” ЪҶЩҲЩҶ Ш§ЫҢЩҶ ЫҢЩҮ Ш§Щҫ ЩҒШ§ШұШіЫҢЩҮ.
// Щ…ЩҲЩӮШ№ Ш®ЩҲЩҶШҜЩҶ Щ…ЩӮШҜШ§Шұ ШЁШұШ§ЫҢ ЩҒШұШіШӘШ§ШҜЩҶ ШЁЩҮ ШіШұЩҲШұШҢ ШӯШӘЩ…Ш§ЩӢ ШЁШ§ЫҢШҜ Ш§ШІ toWesternDigits ШұШҜ ШЁШҙЩҮ
// (ЪҶЩҲЩҶ Number('ЫөЫ°Ы°Ы°') ШҜШұ Ш¬Ш§ЩҲШ§Ш§ШіЪ©ШұЫҢЩҫШӘ NaN Щ…ЫҢвҖҢШҜЩҮШҢ ЩҶЩҮ 5000).
function sanitizeNumericInput(inputEl) {
  inputEl.addEventListener('input', (e) => {
    const westernDigitsOnly = toWesternDigits(e.target.value).replace(/[^\d]/g, '');
    e.target.value = toPersianDigits(westernDigitsOnly);
  });
}

// Щ…ЩӮШҜШ§Шұ ЫҢЪ© ЩҲШұЩҲШҜЫҢ Ш№ШҜШҜЫҢ (Ъ©ЩҮ ШұЩӮЩ…вҖҢЩҮШ§ЫҢ ЩҒШ§ШұШіЫҢ ЩҶЩ…Ш§ЫҢШҙ Щ…ЫҢвҖҢШҜЩҮ) ШұШ§ ШЁЩҮ Ш№ШҜШҜ ЩӮШ§ШЁЩ„вҖҢШ§ШіШӘЩҒШ§ШҜЩҮ
// ШЁШұШ§ЫҢ ШіШұЩҲШұ ШӘШЁШҜЫҢЩ„ Щ…ЫҢвҖҢЪ©ЩҶШҜ. ЩҮЩ…ЩҮвҖҢШ¬Ш§ ШЁЩҮвҖҢШ¬Ш§ЫҢ Number(el.value) Ш§ШІ Ш§ЫҢЩҶ Ш§ШіШӘЩҒШ§ШҜЩҮ Ъ©ЩҶ.
function readNumericInput(inputEl) {
  return Number(toWesternDigits(inputEl.value));
}

// ЩҮЩ…ЩҮвҖҢЫҢ Edge Function ЩҮШ§ЫҢ Щ…Ш§ ЩҒЩӮШ· POST ЩӮШЁЩҲЩ„ Щ…ЫҢвҖҢЪ©ЩҶЩҶ вҖ” ЫҢЪ© ШӘШ§ШЁШ№ ЩҲШ§ШӯШҜ ШЁШұШ§ЫҢ ЩҮЩ…ЩҮ.
async function apiPost(endpoint, payload) {
  try {
    const res = await fetch(`${API_BASE_URL}/${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData: tg?.initData || null, ...payload })
    });
    if (!res.ok) throw new Error('bad response: ' + res.status);
    return await res.json();
  } catch (e) {
    console.warn(`apiPost(${endpoint}) failed:`, e);
    return null;
  }
}

// ЪҶЩҲЩҶ ЩҮЩҶЩҲШІ ЪҶЩҶШҜШҙШұЪ©ШӘЫҢ (multi-company) ЩҶШҜШ§ШұЫҢЩ… (Phase 5.8ШҢ ШіШ§Ш®ШӘЩҮ ЩҶШҙШҜЩҮ)ШҢ ЩҮЩ…ЫҢШҙЩҮ Ш§ЩҲЩ„ЫҢЩҶ
// ШҙШұЪ©ШӘЫҢ Ъ©ЩҮ get-companies ШЁШұЩ…ЫҢвҖҢЪҜШұШҜЩҲЩҶЩҮ ШұЩҲ ШЁЩҮ Ш№ЩҶЩҲШ§ЩҶ ШҙШұЪ©ШӘ ЩҒШ№Ш§Щ„ Ъ©Ш§ШұШЁШұ ШҜШұ ЩҶШёШұ Щ…ЫҢвҖҢЪҜЫҢШұЫҢЩ….
let cachedCompany = null;
async function getMyCompanyInfo() {
  if (cachedCompany) return cachedCompany;
  const result = await apiPost('get-companies', {});
  const companies = result?.companies || [];
  if (companies.length === 0) return null;
  cachedCompany = companies[0];
  return cachedCompany;
}
async function getMyCompanyId() {
  const info = await getMyCompanyInfo();
  return info?.company_id ?? null;
}

// --- ШҜШ§ШҜЩҮвҖҢЫҢ ЩҶЩ…Ш§ЫҢШҙЫҢ ШЁШұШ§ЫҢ ЩҫЫҢШҙвҖҢЩҶЩ…Ш§ЫҢШҙШҢ ШӘШ§ ШІЩ…Ш§ЩҶ ШіШ§Ш®ШӘЩҮвҖҢШҙШҜЩҶ ШЁЩӮЫҢЩҮвҖҢЫҢ Edge Function ЩҮШ§ ---
const DEMO_TAGS = [
  { id: 'fuel', name: 'ШіЩҲШ®ШӘ' },
  { id: 'meal', name: 'ЩҫШ°ЫҢШұШ§ЫҢЫҢ' },
  { id: 'office', name: 'Щ„ЩҲШ§ШІЩ… Ш§ШҜШ§ШұЫҢ' },
  { id: 'transport', name: 'ШӯЩ…Щ„вҖҢЩҲЩҶЩӮЩ„' },
  { id: 'other', name: 'Щ…ШӘЩҒШұЩӮЩҮ' },
];
const DEMO_BALANCE = 850000;
const DEMO_EMPLOYEES = [
  { company_member_id: 'u1', name: 'Ш№Щ„ЫҢ Щ…ШӯЩ…ШҜЫҢ', balance: 850000 },
  { company_member_id: 'u2', name: 'ШіШ§ШұШ§ Ш§ШӯЩ…ШҜЫҢ', balance: 120000 },
  { company_member_id: 'u3', name: 'ШұШ¶Ш§ Ъ©ШұЫҢЩ…ЫҢ', balance: -50000 },
  { company_member_id: 'u4', name: 'Щ…ШұЫҢЩ… ШұШ¶Ш§ЫҢЫҢ', balance: 0 },
];

const app = document.getElementById('app');
const screen = new URLSearchParams(location.search).get('screen') || 'home';

// ===================================================================
// ШөЩҒШӯЩҮ: Ш«ШЁШӘ ЩҮШІЫҢЩҶЩҮ
// ===================================================================
async function renderExpenseScreen() {
  const companyId = await getMyCompanyId();
  const tagsResult = companyId ? await apiPost('get-tags', { company_id: companyId }) : null;
  const tagsData = tagsResult?.tags || DEMO_TAGS;
  const balance = DEMO_BALANCE; // ШҜШұ ШўЫҢЩҶШҜЩҮ Ш§ШІ ЫҢЪ© endpoint Щ…ЩҲШ¬ЩҲШҜЫҢ ЪҜШұЩҒШӘЩҮ Щ…ЫҢвҖҢШҙЩҲШҜ

  let selectedTag = null;
  let receiptBase64 = null;

  app.innerHTML = `
    <div class="screen-title">рҹ§ҫ Ш«ШЁШӘ ЩҮШІЫҢЩҶЩҮ</div>
    <div class="balance-strip">
      <span class="label">Щ…ЩҲШ¬ЩҲШҜЫҢ ЩҒШ№Щ„ЫҢ</span>
      <span class="value ${balance < 0 ? 'negative' : ''}">${formatNumber(balance)} ШӘЩҲЩ…Ш§ЩҶ</span>
    </div>

    <div class="amount-block">
      <input id="amount" class="amount-input" type="tel" inputmode="numeric" placeholder="0" />
      <div class="amount-rule"></div>
      <div class="amount-suffix">ШӘЩҲЩ…Ш§ЩҶ</div>
    </div>

    <div class="ledger-row">
      <label>ШӘЪҜ ЩҮШІЫҢЩҶЩҮ</label>
      <div id="tagList" class="tag-list"></div>
    </div>

    <div class="ledger-row">
      <label>ШӘЩҲШ¶ЫҢШӯ (Ш§Ш®ШӘЫҢШ§ШұЫҢ)</label>
      <textarea id="description" rows="2" placeholder="Щ…Ш«Щ„Ш§ЩӢ: ШЁЩҶШІЫҢЩҶ Щ…Ш§ШҙЫҢЩҶ ШҙШұЪ©ШӘ"></textarea>
    </div>

    statusEl.textContent = 'вқҢ get-companies fail ШҙШҜ';
    return;
  }

  if (companies.length === 0) {
    statusEl.textContent = 'вҡ пёҸ get-companies Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ ЩҲЩ„ЫҢ ЩҮЫҢЪҶ ШҙШұЪ©ШӘЫҢ ШЁШұЩҶЪҜШҙШӘ.';
    tagsEl.value = '(ШҙШұЪ©ШӘЫҢ ШЁШұШ§ЫҢ ШӘШіШӘ ЩҲШ¬ЩҲШҜ ЩҶШҜШ§ШұШҜ)';
    employeesEl.value = '(ШҙШұЪ©ШӘЫҢ ШЁШұШ§ЫҢ ШӘШіШӘ ЩҲШ¬ЩҲШҜ ЩҶШҜШ§ШұШҜ)';
    return;
  }

  const firstCompany = companies[0];
  let tags = [];

  // Щ…ШұШӯЩ„ЩҮ ЫІ: get-tags
  try {
    const res = await fetch(`${API_BASE_URL}/get-tags`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData: tg.initData, company_id: firstCompany.company_id }),
    });
    const text = await res.text();
    tagsEl.value = `ШҙШұЪ©ШӘ: ${firstCompany.name} (${firstCompany.company_id})\nHTTP ${res.status}\n${text}`;
    if (res.ok) {
      const json = JSON.parse(text);
      tags = json.tags || [];
    }
  } catch (e) {
    tagsEl.value = `Ш®Ш·Ш§: ${e}`;
  }

  // Щ…ШұШӯЩ„ЩҮ Ыі: get-employees (Щ…Щ…Ъ©ЩҶЩҮ 403 ШЁШҜЩҮ Ш§ЪҜЩҮ Ъ©Ш§ШұШЁШұ owner ЩҶШЁШ§ШҙЩҮ вҖ” Ш·ШЁЫҢШ№ЫҢЩҮ)
  let employees = [];
  try {
    const res = await fetch(`${API_BASE_URL}/get-employees`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData: tg.initData, company_id: firstCompany.company_id }),
    });
    const text = await res.text();
    employeesEl.value = `ШҙШұЪ©ШӘ: ${firstCompany.name} (${firstCompany.company_id})\nHTTP ${res.status}\n${text}`;
    if (res.ok) {
      const json = JSON.parse(text);
      employees = json.employees || [];
    }
  } catch (e) {
    employeesEl.value = `Ш®Ш·Ш§: ${e}`;
  }

  statusEl.textContent = 'вң… ШўЩ…Ш§ШҜЩҮ ШЁШұШ§ЫҢ ШӘШіШӘ submit-expense вҖ” ЩҫШ§ЫҢЫҢЩҶ ШөЩҒШӯЩҮ ШұЩҲ ШЁШЁЫҢЩҶ';

  // --- ЩҒШұЩ… ШӘШіШӘ submit-expense ---
  if (tags.length > 0) {
    testTagSelect.innerHTML = tags.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
  } else {
    testTagSelect.innerHTML = `<option value="">(ШЁШҜЩҲЩҶ ШӘЪҜ)</option>`;
  }
  expenseFormRow.style.display = 'flex';
  sanitizeNumericInput(testAmount);

  testSubmitExpenseBtn.addEventListener('click', async () => {
    const amount = readNumericInput(testAmount);
    if (!amount || amount <= 0) {
      showToast('Щ…ШЁЩ„Шә Щ…Ш№ШӘШЁШұ ЩҲШ§ШұШҜ Ъ©ЩҶ');
      return;
    }
    const tagId = testTagSelect.value || null;
    testSubmitExpenseBtn.disabled = true;
    testSubmitExpenseBtn.textContent = 'ШҜШұ ШӯШ§Щ„ Ш§ШұШіШ§Щ„...';

    try {
      const res = await fetch(`${API_BASE_URL}/submit-expense`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          initData: tg.initData,
          company_id: firstCompany.company_id,
          tag_id: tagId,
          amount: amount,
          description: 'ШӘШіШӘ ШҜШіШӘЫҢ Ш§ШІ ШөЩҒШӯЩҮвҖҢЫҢ test',
        }),
      });
      const text = await res.text();
      const timestamp = new Date().toLocaleTimeString('fa-IR');
      expenseLogEl.value = `[${timestamp}] Щ…ШЁЩ„Шә: ${amount} | HTTP ${res.status}\n${text}\n\n` + expenseLogEl.value;
    } catch (e) {
      expenseLogEl.value = `Ш®Ш·Ш§: ${e}\n\n` + expenseLogEl.value;
    } finally {
      testSubmitExpenseBtn.disabled = false;
      testSubmitExpenseBtn.textContent = 'Ш«ШЁШӘ ЩҮШІЫҢЩҶЩҮвҖҢЫҢ ШӘШіШӘЫҢ';
    }
  });

  // --- ЩҒШұЩ… ШӘШіШӘ submit-charge ---
  // ЩҒЩӮШ· Ш§ЪҜЩҮ get-employees Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ (ЫҢШ№ЩҶЫҢ Ъ©Ш§ШұШЁШұ ЩҒШ№Щ„ЫҢ owner ЩҮЩ…ЫҢЩҶ ШҙШұЪ©ШӘЩҮ) ЩҶЩ…Ш§ЫҢШҙ ШҜШ§ШҜЩҮ Щ…ЫҢвҖҢШҙЩҮ вҖ”
  // ШЁШұШ§ЫҢ Ъ©Ш§ШұШЁШұ employee Ш§ЫҢЩҶ ШЁШ®Шҙ Щ…Ш®ЩҒЫҢ Щ…ЫҢвҖҢЩ…ЩҲЩҶЩҮ ЪҶЩҲЩҶ submit-charge ШұЩҲШҙ 403 Щ…ЫҢвҖҢШҜЩҮ.
  if (employees.length > 0) {
    testEmployeeSelect.innerHTML = employees
      .map(e => `<option value="${e.company_member_id}">${e.name} (${e.role}) вҖ” Щ…ЩҲШ¬ЩҲШҜЫҢ ЩҒШ№Щ„ЫҢ: ${e.balance}</option>`)
      .join('');
    chargeFormRow.style.display = 'flex';
    sanitizeNumericInput(testChargeAmount);
  }

  testSubmitChargeBtn.addEventListener('click', async () => {
    const amount = readNumericInput(testChargeAmount);
    if (!amount || amount <= 0) {
      showToast('Щ…ШЁЩ„Шә Щ…Ш№ШӘШЁШұ ЩҲШ§ШұШҜ Ъ©ЩҶ');
      return;
    }
    const targetId = testEmployeeSelect.value;
    testSubmitChargeBtn.disabled = true;
    testSubmitChargeBtn.textContent = 'ШҜШұ ШӯШ§Щ„ Ш§ШұШіШ§Щ„...';

    try {
      const res = await fetch(`${API_BASE_URL}/submit-charge`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          initData: tg.initData,
          company_id: firstCompany.company_id,
          target_company_member_id: targetId,
          amount: amount,
          description: 'ШӘШіШӘ ШҜШіШӘЫҢ Ш§ШІ ШөЩҒШӯЩҮвҖҢЫҢ test',
        }),
      });
      const text = await res.text();
      const timestamp = new Date().toLocaleTimeString('fa-IR');
      chargeLogEl.value = `[${timestamp}] ЪҜЫҢШұЩҶШҜЩҮ: ${targetId} | Щ…ШЁЩ„Шә: ${amount} | HTTP ${res.status}\n${text}\n\n` + chargeLogEl.value;
    } catch (e) {
      chargeLogEl.value = `Ш®Ш·Ш§: ${e}\n\n` + chargeLogEl.value;
    } finally {
      testSubmitChargeBtn.disabled = false;
      testSubmitChargeBtn.textContent = 'Ш«ШЁШӘ ШҙШ§ШұЪҳ ШӘШіШӘЫҢ';
    }
  });

  // --- ЩҒШұЩ… ШӘШіШӘ submit-petty-cash-request ---
  sanitizeNumericInput(testRequestAmount);

  testSubmitRequestBtn.addEventListener('click', async () => {
    const amount = readNumericInput(testRequestAmount);
    if (!amount || amount <= 0) {
      showToast('Щ…ШЁЩ„Шә Щ…Ш№ШӘШЁШұ ЩҲШ§ШұШҜ Ъ©ЩҶ');
      return;
    }
    testSubmitRequestBtn.disabled = true;
    testSubmitRequestBtn.textContent = 'ШҜШұ ШӯШ§Щ„ Ш§ШұШіШ§Щ„...';

    try {
      const res = await fetch(`${API_BASE_URL}/submit-petty-cash-request`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          initData: tg.initData,
          company_id: firstCompany.company_id,
          amount: amount,
          description: 'ШӘШіШӘ ШҜШіШӘЫҢ Ш§ШІ ШөЩҒШӯЩҮвҖҢЫҢ test',
        }),
      });
      const text = await res.text();
      const timestamp = new Date().toLocaleTimeString('fa-IR');
      requestLogEl.value = `[${timestamp}] Щ…ШЁЩ„Шә: ${amount} | HTTP ${res.status}\n${text}\n\n` + requestLogEl.value;
    } catch (e) {
      requestLogEl.value = `Ш®Ш·Ш§: ${e}\n\n` + requestLogEl.value;
    } finally {
      testSubmitRequestBtn.disabled = false;
      testSubmitRequestBtn.textContent = 'Ш«ШЁШӘ ШҜШұШ®ЩҲШ§ШіШӘ ШӘШіШӘЫҢ';
    }
  });
}

// ===================================================================
// ШҜЪ©Щ…ЩҮ Ш§ШөЩ„ЫҢ вҖ” Ш§ШІ MainButton ШӘЩ„ЪҜШұШ§Щ… Ш§ШіШӘЩҒШ§ШҜЩҮ Щ…ЫҢвҖҢЪ©ЩҶШҜШҢ ЫҢШ§ ШҜШұ ЩҫЫҢШҙвҖҢЩҶЩ…Ш§ЫҢШҙ Ш¬Ш§ЫҢЪҜШІЫҢЩҶ ШҜШ§ШұШҜ
// ===================================================================
function setupMainButton(label, onClick) {
  if (tg) {
    tg.MainButton.setText(label);
    tg.MainButton.show();
    if (tg._lastHandler) tg.MainButton.offClick(tg._lastHandler);
    tg.MainButton.onClick(onClick);
    tg._lastHandler = onClick;
  } else {
    let btn = document.getElementById('fallbackMainButton');
    if (!btn) {
      btn = document.createElement('button');
      btn.id = 'fallbackMainButton';
      btn.style = 'position:fixed;bottom:60px;left:14px;right:14px;padding:14px;border:none;border-radius:12px;background:var(--ink);color:var(--paper);font-family:inherit;font-size:15px;font-weight:700;z-index:55;cursor:pointer;';
      document.body.appendChild(btn);
    }
    btn.textContent = label;
    btn.onclick = onClick;
  }
}

// ШөЩҒШӯЩҮ: Ш®Ш§ЩҶЩҮ вҖ” Щ…ЩӮШөШҜ ЩҫЫҢШҙвҖҢЩҒШұШ¶ Menu Button ШӘЩ„ЪҜШұШ§Щ… (ШўЫҢЪ©ЩҲЩҶ Ъ©ЩҶШ§Шұ Ш§ШӘЪҶЩ…ЩҶШӘ).
// ЪҶЩҲЩҶ Menu Button ЩҒЩӮШ· Щ…ЫҢвҖҢШӘЩҲЩҶЩҮ ЫҢЪ© URL Ш«Ш§ШЁШӘ ШЁШ§ШІ Ъ©ЩҶЩҮ (ЩҶЩҮ ЩҫЫҢШ§Щ… inline ШӘЩ„ЪҜШұШ§Щ…)ШҢ

async function renderHomeScreen() {
  const companyInfo = isInsideTelegram ? await getMyCompanyInfo() : null;
  const isOwner = companyInfo?.role === 'owner';

  app.innerHTML = `
    <div class="screen-title">ШӘЩҶШ®ЩҲШ§ЩҮ рҹ‘Ӣ</div>
    <div class="ledger-row" style="border:none;">
      <button id="homeExpenseBtn" class="test-btn" style="background:var(--gold);margin-bottom:10px;">рҹ§ҫ Ш«ШЁШӘ ЩҮШІЫҢЩҶЩҮ</button>
      <button id="homeRequestBtn" class="test-btn" style="background:var(--ink);margin-bottom:10px;">рҹ’ө ШҜШұШ®ЩҲШ§ШіШӘ ШӘЩҶШ®ЩҲШ§ЩҮ</button>
      <button id="homeSettlementBtn" class="test-btn" style="background:var(--danger);margin-bottom:10px;">рҹ“Ӣ ШӘШіЩҲЫҢЩҮ ЩҮШІЫҢЩҶЩҮвҖҢЩҮШ§</button>
      ${isOwner ? '<button id="homeChargeBtn" class="test-btn" style="background:var(--success);margin-bottom:10px;">рҹ’° ШҙШ§ШұЪҳ ШӘЩҶШ®ЩҲШ§ЩҮ</button>' : ''}
      <button id="homeSettingsBtn" class="test-btn" style="background:var(--ink-soft);">вҡҷпёҸ ШӘЩҶШёЫҢЩ…Ш§ШӘ</button>
    </div>
  `;
  document.getElementById('homeExpenseBtn').addEventListener('click', () => {
    location.search = '?screen=expense';
  });
  document.getElementById('homeRequestBtn').addEventListener('click', () => {
    location.search = '?screen=request';
  });
  document.getElementById('homeSettlementBtn').addEventListener('click', () => {
    location.search = '?screen=settlement';
  });
  if (isOwner) {
    document.getElementById('homeChargeBtn').addEventListener('click', () => {
      location.search = '?screen=charge';
    });
  }
  document.getElementById('homeSettingsBtn').addEventListener('click', () => {
    location.search = '?screen=settings';
  });
}

// ===================================================================
// ШөЩҒШӯЩҮ: ШӘЩҶШёЫҢЩ…Ш§ШӘ вҖ” Ш¬Ш§ЫҢЪҜШІЫҢЩҶ Ъ©Ш§Щ…Щ„ В«/start settingsВ» Ъ©ЩҮ Ъ©Ш§Шұ ЩҶЪ©ШұШҜ.
// Ш§ЪҜЩҮ owner ШҙШұЪ©ШӘЫҢ ЩҶШЁШ§ШҙЫҢ: ЩҒШұЩ… ШіШ§Ш®ШӘ ШҙШұЪ©ШӘ. Ш§ЪҜЩҮ owner ШЁШ§ШҙЫҢ: ЩҒШұЩ… ШҜШ№ЩҲШӘ Ъ©Ш§ШұЩ…ЩҶШҜ.
// ===================================================================
async function renderSettingsScreen() {
  app.innerHTML = `<div class="screen-title">вҡҷпёҸ ШӘЩҶШёЫҢЩ…Ш§ШӘ</div><div id="settingsBody">ШҜШұ ШӯШ§Щ„ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ...</div>`;
  const bodyEl = document.getElementById('settingsBody');

  if (!isInsideTelegram) {
    bodyEl.innerHTML = `<div class="ledger-row" style="border:none;">Ш§ЫҢЩҶ ШөЩҒШӯЩҮ ЩҒЩӮШ· ШҜШ§Ш®Щ„ ШӘЩ„ЪҜШұШ§Щ… Ъ©Ш§Шұ Щ…ЫҢвҖҢЪ©ЩҶШҜ.</div>`;
    return;
  }

  const companyInfo = await getMyCompanyInfo();

  if (!companyInfo) {
    // Ъ©Ш§ШұШЁШұ Щ…Ш§Щ„Ъ© ЩҮЫҢЪҶ ШҙШұЪ©ШӘЫҢ ЩҶЫҢШіШӘ вҶ’ ЩҒШұЩ… ШіШ§Ш®ШӘ ШҙШұЪ©ШӘ
    bodyEl.innerHTML = `
      <div class="ledger-row">
        <label>Ш§ШіЩ… ШҙШұЪ©ШӘ</label>
        <input id="companyNameInput" type="text" placeholder="Щ…Ш«Щ„Ш§ЩӢ: ЩҒШұЩҲШҙЪҜШ§ЩҮ Щ…ЩҶ" />
      </div>
      <button id="createCompanyBtn" class="test-btn" style="background:var(--gold);margin-top:14px;">ШіШ§Ш®ШӘ ШҙШұЪ©ШӘ</button>
      <div id="settingsMsg" style="margin-top:10px;font-size:13px;"></div>
    `;
    document.getElementById('createCompanyBtn').addEventListener('click', async () => {
      const name = document.getElementById('companyNameInput').value.trim();
      const msgEl = document.getElementById('settingsMsg');
      if (!name) { msgEl.textContent = 'Ш§ШіЩ… ШҙШұЪ©ШӘ ШұЩҲ ЩҲШ§ШұШҜ Ъ©ЩҶ.'; return; }
      msgEl.textContent = 'ШҜШұ ШӯШ§Щ„ ШіШ§Ш®ШӘ...';
      const result = await apiPost('create-company', { company_name: name });
      if (result?.company_id) {
        cachedCompany = null; // Ъ©Шҙ ЩӮШЁЩ„ЫҢ (Ш®Ш§Щ„ЫҢ) ШұЩҲ ЩҫШ§Ъ© Ъ©ЩҶ ШӘШ§ ШҜЩҒШ№ЩҮвҖҢЫҢ ШЁШ№ШҜ ШҜЩҲШЁШ§ШұЩҮ ЪҶЪ© ШЁШҙЩҮ
        msgEl.style.color = 'var(--success)';
        msgEl.textContent = 'ШҙШұЪ©ШӘ ШіШ§Ш®ШӘЩҮ ШҙШҜ вң…';
        setTimeout(() => { location.search = '?screen=home'; }, 900);
      } else {
        msgEl.style.color = 'var(--danger)';
        msgEl.textContent = 'Ш®Ш·Ш§ ШҜШұ ШіШ§Ш®ШӘ ШҙШұЪ©ШӘ. ШҜЩҲШЁШ§ШұЩҮ Ш§Щ…ШӘШӯШ§ЩҶ Ъ©ЩҶ.';
      }
    });
    return;
  }

  if (companyInfo.role !== 'owner') {
    bodyEl.innerHTML = `<div class="ledger-row" style="border:none;">ЩҒЩӮШ· Щ…Ш§Щ„Ъ© ШҙШұЪ©ШӘ Щ…ЫҢвҖҢШӘЩҲШ§ЩҶШҜ Ъ©Ш§ШұШЁШұ ШҜШ№ЩҲШӘ Ъ©ЩҶШҜ.</div>`;
    return;
  }

  // owner ЫҢЩҮ ШҙШұЪ©ШӘЩҮ вҶ’ ЩҒШұЩ… ШҜШ№ЩҲШӘ Ъ©Ш§ШұЩ…ЩҶШҜ
  bodyEl.innerHTML = `
    <div class="ledger-row">
      <label>ШҙЩ…Ш§ШұЩҮвҖҢЫҢ Ъ©Ш§ШұЩ…ЩҶШҜ</label>
      <input id="invitePhoneInput" type="tel" inputmode="numeric" placeholder="09xxxxxxxxx" />
    </div>
    <button id="inviteBtn" class="test-btn" style="background:var(--gold);margin-top:14px;">ШҜШ№ЩҲШӘ Ъ©Ш§ШұЩ…ЩҶШҜ</button>
    <div id="settingsMsg" style="margin-top:10px;font-size:13px;"></div>
  `;
  sanitizeNumericInput(document.getElementById('invitePhoneInput'));
  document.getElementById('inviteBtn').addEventListener('click', async () => {
    const phone = readNumericInput(document.getElementById('invitePhoneInput'));
    const msgEl = document.getElementById('settingsMsg');
    if (!phone) { msgEl.textContent = 'ШҙЩ…Ш§ШұЩҮ ШұЩҲ ЩҲШ§ШұШҜ Ъ©ЩҶ.'; return; }
    msgEl.textContent = 'ШҜШұ ШӯШ§Щ„ Ш§ШұШіШ§Щ„...';
    const result = await apiPost('invite-member', {
      company_id: companyInfo.company_id,
      phone_number: String(phone),
    });
    if (result?.status === 'added_immediately') {
      msgEl.style.color = 'var(--success)';
      msgEl.textContent = 'Ш§ЫҢЩҶ Ъ©Ш§ШұШЁШұ Ш§ШІ ЩӮШЁЩ„ Ш«ШЁШӘвҖҢЩҶШ§Щ… Ъ©ШұШҜЩҮ ШЁЩҲШҜ ЩҲ ЩҮЩ…ЫҢЩҶ Ш§Щ„Ш§ЩҶ Ш§Ш¶Ш§ЩҒЩҮ ШҙШҜ вң…';
    } else if (result?.status === 'pending_invite') {
      msgEl.style.color = 'var(--success)';
      msgEl.textContent = 'ШҜШ№ЩҲШӘ Ш«ШЁШӘ ШҙШҜ. ЩҲЩӮШӘЫҢ Ш§ЩҲЩҶ ШҙШ®Шө Ш«ШЁШӘвҖҢЩҶШ§Щ… Ъ©ЩҶЩҮШҢ Ш®ЩҲШҜЪ©Ш§Шұ Ш§Ш¶Ш§ЩҒЩҮ Щ…ЫҢвҖҢШҙЩҮ вң…';
    } else {
      msgEl.style.color = 'var(--danger)';
      msgEl.textContent = 'Ш®Ш·Ш§ ШҜШұ Ш§ШұШіШ§Щ„ ШҜШ№ЩҲШӘ. ШҜЩҲШЁШ§ШұЩҮ Ш§Щ…ШӘШӯШ§ЩҶ Ъ©ЩҶ.';
    }
  });
}

// ===================================================================
// ШөЩҒШӯЩҮ: ШӘШіЩҲЫҢЩҮвҖҢЫҢ ЩҮШІЫҢЩҶЩҮвҖҢЩҮШ§ вҖ” Ъ©Ш§ШұЩ…ЩҶШҜ ЩҮШІЫҢЩҶЩҮвҖҢЩҮШ§ЫҢ Ш«ШЁШӘвҖҢШҙШҜЩҮвҖҢЫҢ ЩҮЩҶЩҲШІ-ШӘШіЩҲЫҢЩҮвҖҢЩҶШҙШҜЩҮвҖҢШ§Шҙ ШұЩҲ
// Щ…ЫҢвҖҢШЁЫҢЩҶЩҮШҢ ЪҶЩҶШҜШӘШ§Шҙ ШұЩҲ ШӘЫҢЪ© Щ…ЫҢвҖҢШІЩҶЩҮ (ЫҢШ§ В«Ш§ЩҶШӘШ®Ш§ШЁ ЩҮЩ…ЩҮВ») ЩҲ Щ…ЫҢвҖҢЩҒШұШіШӘЩҮ ШЁШұШ§ЫҢ ШЁШұШұШіЫҢ Щ…Ш§Щ„Ъ©.
// ===================================================================
async function renderSettlementScreen() {
  app.innerHTML = `<div class="screen-title">рҹ“Ӣ ШӘШіЩҲЫҢЩҮвҖҢЫҢ ЩҮШІЫҢЩҶЩҮвҖҢЩҮШ§</div><div id="settlementBody">ШҜШұ ШӯШ§Щ„ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ...</div>`;
  const bodyEl = document.getElementById('settlementBody');

  if (!isInsideTelegram) {
    bodyEl.innerHTML = `<div class="ledger-row" style="border:none;">Ш§ЫҢЩҶ ШөЩҒШӯЩҮ ЩҒЩӮШ· ШҜШ§Ш®Щ„ ШӘЩ„ЪҜШұШ§Щ… Ъ©Ш§Шұ Щ…ЫҢвҖҢЪ©ЩҶШҜ.</div>`;
    return;
  }

  const companyId = await getMyCompanyId();
  if (!companyId) {
    bodyEl.innerHTML = `<div class="ledger-row" style="border:none;">Ш№Ш¶ЩҲ ЩҮЫҢЪҶ ШҙШұЪ©ШӘЫҢ ЩҶЫҢШіШӘЫҢШҜ.</div>`;
    return;
  }

  const result = await apiPost('get-registered-expenses', { company_id: companyId });
  const expenses = result?.expenses || [];

  if (expenses.length === 0) {
    bodyEl.innerHTML = `<div class="ledger-row" style="border:none;">ЩҮЫҢЪҶ ЩҮШІЫҢЩҶЩҮвҖҢЫҢ ШӘШіЩҲЫҢЩҮвҖҢЩҶШҙШҜЩҮвҖҢШ§ЫҢ ЩҶШҜШ§ШұЫҢ.</div>`;
    return;
  }

  const selected = new Set();

  bodyEl.innerHTML = `
    <button id="selectAllBtn" class="test-btn" style="background:var(--ink-soft);margin-bottom:10px;">Ш§ЩҶШӘШ®Ш§ШЁ ЩҮЩ…ЩҮ</button>
    <div id="expenseList"></div>
    <div class="balance-strip" style="margin-top:14px;">
      <span class="label">Ш¬Щ…Ш№ Ш§ЩҶШӘШ®Ш§ШЁвҖҢШҙШҜЩҮ</span>
      <span class="value" id="selectedTotal">Ы° ШӘЩҲЩ…Ш§ЩҶ</span>
    </div>
    <button id="submitSettlementBtn" class="test-btn" style="background:var(--gold);margin-top:10px;" disabled>Ш§ШұШіШ§Щ„ ШЁШұШ§ЫҢ ШӘШіЩҲЫҢЩҮ</button>
    <div id="settlementMsg" style="margin-top:10px;font-size:13px;"></div>
  `;

  const listEl = document.getElementById('expenseList');
  const totalEl = document.getElementById('selectedTotal');
  const submitBtn = document.getElementById('submitSettlementBtn');

  function updateTotal() {
    let sum = 0;
    expenses.forEach(e => { if (selected.has(e.id)) sum += Number(e.amount); });
    totalEl.textContent = `${formatNumber(sum)} ШӘЩҲЩ…Ш§ЩҶ`;
    submitBtn.disabled = selected.size === 0;
  }

  expenses.forEach(e => {
    const row = document.createElement('div');
    row.className = 'employee-row';
    const dateStr = new Date(e.created_at).toLocaleDateString('fa-IR');
    row.innerHTML = `
      <span class="name">
        <input type="checkbox" id="cb_${e.id}" style="margin-left:8px;" />
        ${e.tag_name || 'ШЁШҜЩҲЩҶ ШӘЪҜ'} вҖ” ${dateStr}${e.description ? ' вҖ” ' + e.description : ''}
      </span>
      <span class="balance">${formatNumber(e.amount)} ШӘЩҲЩ…Ш§ЩҶ</span>
    `;
    row.querySelector('input').addEventListener('change', (ev) => {
      if (ev.target.checked) selected.add(e.id); else selected.delete(e.id);
      updateTotal();
    });
    row.addEventListener('click', (ev) => {
      if (ev.target.tagName !== 'INPUT') {
        const cb = row.querySelector('input');
        cb.checked = !cb.checked;
        cb.dispatchEvent(new Event('change'));
      }
    });
    listEl.appendChild(row);
  });

  document.getElementById('selectAllBtn').addEventListener('click', () => {
    const allSelected = selected.size === expenses.length;
    expenses.forEach(e => {
      const cb = document.getElementById(`cb_${e.id}`);
      cb.checked = !allSelected;
      if (!allSelected) selected.add(e.id); else selected.delete(e.id);
    });
    updateTotal();
  });

  submitBtn.addEventListener('click', async () => {
    const msgEl = document.getElementById('settlementMsg');
    submitBtn.disabled = true;
    submitBtn.textContent = 'ШҜШұ ШӯШ§Щ„ Ш§ШұШіШ§Щ„...';
    const res = await apiPost('submit-settlement', {
      company_id: companyId,
      expense_ids: Array.from(selected),
    });
    if (res?.settlement_id) {
      msgEl.style.color = 'var(--success)';
      msgEl.textContent = `ШӘШіЩҲЫҢЩҮ Ш«ШЁШӘ ШҙШҜ вң… (${res.expense_count} ЩҮШІЫҢЩҶЩҮШҢ ${formatNumber(res.total_amount)} ШӘЩҲЩ…Ш§ЩҶ)`;
      tg ? setTimeout(() => tg.close(), 1200) : setTimeout(() => location.search = '?screen=home', 1200);
    } else {
      msgEl.style.color = 'var(--danger)';
      msgEl.textContent = res?.error || 'Ш®Ш·Ш§ ШҜШұ Ш§ШұШіШ§Щ„ ШӘШіЩҲЫҢЩҮ. ШҜЩҲШЁШ§ШұЩҮ Ш§Щ…ШӘШӯШ§ЩҶ Ъ©ЩҶ.';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Ш§ШұШіШ§Щ„ ШЁШұШ§ЫҢ ШӘШіЩҲЫҢЩҮ';
    }
  });

  updateTotal();
}

// ===================================================================
// ШөЩҒШӯЩҮ: ШЁШ§ШІШЁЫҢЩҶЫҢ ШӘШіЩҲЫҢЩҮ (ЩҒЩӮШ· owner) вҖ” ШұЫҢШІ ЩҮШІЫҢЩҶЩҮвҖҢЩҮШ§ЫҢ ЫҢЪ© ШӘШіЩҲЫҢЩҮ ШұЩҲ ЩҶШҙЩҲЩҶ Щ…ЫҢвҖҢШҜЩҮШҢ
// ЩҫЫҢШҙвҖҢЩҒШұШ¶ ЩҮЩ…ЩҮ ШӘЫҢЪ©вҖҢШ®ЩҲШұШҜЩҮ (ШӘШЈЫҢЫҢШҜ)ШҢ owner Щ…ЫҢвҖҢШӘЩҲЩҶЩҮ ШӘЫҢЪ© ЩҮШұЪ©ШҜЩҲЩ… ШұЩҲ ШЁШұШҜШ§ШұЩҮ (ШұШҜ).
// ===================================================================
async function renderSettlementReviewScreen() {
  app.innerHTML = `<div class="screen-title">рҹ”Қ ШЁШ§ШІШЁЫҢЩҶЫҢ ШӘШіЩҲЫҢЩҮ</div><div id="reviewBody">ШҜШұ ШӯШ§Щ„ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ...</div>`;
  const bodyEl = document.getElementById('reviewBody');

  if (!isInsideTelegram) {
    bodyEl.innerHTML = `<div class="ledger-row" style="border:none;">Ш§ЫҢЩҶ ШөЩҒШӯЩҮ ЩҒЩӮШ· ШҜШ§Ш®Щ„ ШӘЩ„ЪҜШұШ§Щ… Ъ©Ш§Шұ Щ…ЫҢвҖҢЪ©ЩҶШҜ.</div>`;
    return;
  }

  const settlementId = new URLSearchParams(location.search).get('id');
  if (!settlementId) {
    bodyEl.innerHTML = `<div class="ledger-row" style="border:none;">ШҙЩҶШ§ШіЩҮвҖҢЫҢ ШӘШіЩҲЫҢЩҮ ЩҫЫҢШҜШ§ ЩҶШҙШҜ.</div>`;
    return;
  }

  const result = await apiPost('get-settlement-detail', { settlement_id: settlementId });
  if (!result?.settlement) {
    bodyEl.innerHTML = `<div class="ledger-row" style="border:none;color:var(--danger);">ШҜШіШӘШұШіЫҢ ЩҶШҜШ§ШұЫҢ ЫҢШ§ Ш§ЫҢЩҶ ШӘШіЩҲЫҢЩҮ ЩҫЫҢШҜШ§ ЩҶШҙШҜ.</div>`;
    return;
  }

  const { settlement, expenses } = result;

  if (settlement.status !== 'submitted') {
    bodyEl.innerHTML = `<div class="ledger-row" style="border:none;">Ш§ЫҢЩҶ ШӘШіЩҲЫҢЩҮ ЩӮШЁЩ„Ш§ЩӢ ШЁШұШұШіЫҢ ШҙШҜЩҮ (ЩҲШ¶Ш№ЫҢШӘ: ${settlement.status}).</div>`;
    return;
  }

  bodyEl.innerHTML = `
    <div class="ledger-row" style="border:none;">Ъ©Ш§ШұЩ…ЩҶШҜ: ${settlement.employee_name || 'вҖ”'}</div>
    <div id="reviewList"></div>
    <button id="submitReviewBtn" class="test-btn" style="background:var(--gold);margin-top:14px;">Ш«ШЁШӘ ЩҶШӘЫҢШ¬ЩҮвҖҢЫҢ ШЁШұШұШіЫҢ</button>
    <div id="reviewMsg" style="margin-top:10px;font-size:13px;"></div>
  `;

  const listEl = document.getElementById('reviewList');
  expenses.forEach(e => {
    const row = document.createElement('div');
    row.className = 'employee-row';
    const dateStr = new Date(e.created_at).toLocaleDateString('fa-IR');
    row.innerHTML = `
      <span class="name">
        <input type="checkbox" id="rv_${e.id}" checked style="margin-left:8px;" />
        ${e.tag_name || 'ШЁШҜЩҲЩҶ ШӘЪҜ'} вҖ” ${dateStr}${e.description ? ' вҖ” ' + e.description : ''}
      </span>
      <span class="balance">${formatNumber(e.amount)} ШӘЩҲЩ…Ш§ЩҶ</span>
    `;
    row.addEventListener('click', (ev) => {
      if (ev.target.tagName !== 'INPUT') {
        const cb = row.querySelector('input');
        cb.checked = !cb.checked;
      }
    });
    listEl.appendChild(row);
  });

  document.getElementById('submitReviewBtn').addEventListener('click', async () => {
    const msgEl = document.getElementById('reviewMsg');
    const approved = [];
    const rejected = [];
    expenses.forEach(e => {
      const cb = document.getElementById(`rv_${e.id}`);
      if (cb.checked) approved.push(e.id); else rejected.push(e.id);
    });

    const btn = document.getElementById('submitReviewBtn');
    btn.disabled = true;
    btn.textContent = 'ШҜШұ ШӯШ§Щ„ Ш«ШЁШӘ...';

    const res = await apiPost('review-settlement', {
      settlement_id: settlementId,
      approved_expense_ids: approved,
      rejected_expense_ids: rejected,
    });

    if (res?.final_status) {
      msgEl.style.color = 'var(--success)';
      const statusFa = { approved: 'ШӘШЈЫҢЫҢШҜ Ъ©Ш§Щ…Щ„', rejected: 'ШұШҜ Ъ©Ш§Щ…Щ„', correction_requested: 'ШӘШЈЫҢЫҢШҜ ШЁШ®ШҙЫҢ' }[res.final_status] || res.final_status;
      msgEl.textContent = `Ш«ШЁШӘ ШҙШҜ вң… вҖ” ЩҶШӘЫҢШ¬ЩҮ: ${statusFa} (${res.approved_count} ШӘШЈЫҢЫҢШҜШҢ ${res.rejected_count} ШұШҜ)`;
      tg ? setTimeout(() => tg.close(), 1600) : setTimeout(() => location.search = '?screen=home', 1600);
    } else {
      msgEl.style.color = 'var(--danger)';
      msgEl.textContent = res?.error || 'Ш®Ш·Ш§ ШҜШұ Ш«ШЁШӘ ШЁШұШұШіЫҢ. ШҜЩҲШЁШ§ШұЩҮ Ш§Щ…ШӘШӯШ§ЩҶ Ъ©ЩҶ.';
      btn.disabled = false;
      btn.textContent = 'Ш«ШЁШӘ ЩҶШӘЫҢШ¬ЩҮвҖҢЫҢ ШЁШұШұШіЫҢ';
    }
  });
}

// ===================================================================
// Ш§Ш¬ШұШ§ЫҢ ШөЩҒШӯЩҮвҖҢЫҢ Щ…ЩҶШ§ШіШЁ ШЁШұ Ш§ШіШ§Ші ЩҫШ§ШұШ§Щ…ШӘШұ screen
// ===================================================================
if (screen === 'request') renderRequestScreen();
else if (screen === 'charge') renderChargeScreen();
else if (screen === 'test') renderTestScreen();
else if (screen === 'expense') renderExpenseScreen();
else if (screen === 'settings') renderSettingsScreen();
else if (screen === 'settlement') renderSettlementScreen();
else if (screen === 'settlement-review') renderSettlementReviewScreen();
else renderHomeScreen();
</script>
</body>
</html>
